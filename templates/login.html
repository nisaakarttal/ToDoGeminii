{% include 'layout.html' %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card shadow-lg rounded-4 p-4 login-card">

        <!-- HEADER -->
        <div class="card-header text-center bg-primary text-white rounded-top-4 mb-3">
            <h3 class="mb-0 fw-bold">🔑 Login to Your Account</h3>
            <small class="text-white-50">Welcome back! Please login to continue.</small>
        </div>

        <!-- BODY -->
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0">
                            👤
                        </span>
                        <input type="text" class="form-control form-control-lg" name="username" autocomplete="username" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0">
                            🔒
                        </span>
                        <input type="password" class="form-control form-control-lg" name="password" autocomplete="current-password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">
                    🔑 Login
                </button>
            </form>
        </div>

        <!-- FOOTER -->
        <div class="card-footer text-center text-muted">
            Don't have an account?
            <a href="/auth/register-page" class="text-decoration-none fw-semibold text-primary">
                Register here
            </a>
        </div>
    </div>
</div>
