{% include 'layout.html' %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card shadow-lg rounded-4 p-4 register-card">

        <!-- HEADER -->
        <div class="card-header text-center bg-success text-white rounded-top-4 mb-3">
            <h3 class="mb-0 fw-bold">📝 Register Your Account</h3>
            <small class="text-white-50">Join us and manage your tasks easily!</small>
        </div>

        <!-- BODY -->
        <div class="card-body">
            <form id="registerForm">

                <!-- EMAIL & USERNAME -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">📧</span>
                            <input type="email" class="form-control form-control-lg" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="col-md-6 mt-3 mt-md-0">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">👤</span>
                            <input type="text" class="form-control form-control-lg" name="username" placeholder="Choose a username" required>
                        </div>
                    </div>
                </div>

                <!-- FIRST & LAST NAME -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">First Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">🧑</span>
                            <input type="text" class="form-control form-control-lg" name="firstname" placeholder="First name" required>
                        </div>
                    </div>
                    <div class="col-md-6 mt-3 mt-md-0">
                        <label class="form-label fw-semibold">Last Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">🧑‍🦱</span>
                            <input type="text" class="form-control form-control-lg" name="lastname" placeholder="Last name" required>
                        </div>
                    </div>
                </div>

                <!-- ROLE & PHONE -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Role</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">💼</span>
                            <input type="text" class="form-control form-control-lg" name="role" placeholder="Your role" required>
                        </div>
                    </div>
                    <div class="col-md-6 mt-3 mt-md-0">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">📱</span>
                            <input type="text" class="form-control form-control-lg" name="phone_number" placeholder="Your phone" autocomplete="phone_number" required>
                        </div>
                    </div>
                </div>

                <!-- PASSWORD & VERIFY -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">🔒</span>
                            <input type="password" class="form-control form-control-lg" name="password" placeholder="Enter password" autocomplete="new-password" required>
                        </div>
                    </div>
                    <div class="col-md-6 mt-3 mt-md-0">
                        <label class="form-label fw-semibold">Verify Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">🔒</span>
                            <input type="password" class="form-control form-control-lg" name="password2" placeholder="Re-enter password" autocomplete="new-password" required>
                        </div>
                    </div>
                </div>

                <!-- SUBMIT BUTTON -->
                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">
                    ✅ Register
                </button>

            </form>
        </div>

        <!-- FOOTER -->
        <div class="card-footer text-center text-muted">
            Already have an account?
            <a href="/auth/login-page" class="text-decoration-none fw-semibold text-success">
                Login here
            </a>
        </div>

    </div>
</div>
