<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TodoApp with Gemini</title>

    <!-- Base CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/bootstrap.css') }}">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon (opsiyonel) -->
    <link rel="icon" href="{{ url_for('static', path='/img/favicon.ico') }}">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    {% include 'navbar.html' %}

    <!-- MAIN CONTENT -->
    <main class="py-5">
        {% block content %}
        <!-- Varsayılan içerik -->
        <div class="container text-center mt-5">
            <h1 class="fw-bold">FastAPI with Gemini!</h1>
        </div>
        {% endblock %}
    </main>

    <!-- JS -->
    <script src="{{ url_for('static', path='/js/jquery-slim.js') }}"></script>
    <script src="{{ url_for('static', path='/js/popper.js') }}"></script>
    <script src="{{ url_for('static', path='/js/bootstrap.js') }}"></script>
    <script src="{{ url_for('static', path='/js/base.js') }}" defer></script>
</body>
</html>
